{% extends "base.html" %}
{% block title %}Chatbot{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-8 col-lg-10">
        <div class="card section-card p-4">
            <h2 class="fw-bold mb-3">Banking Chatbot</h2>

            <div id="chat" class="chat-box mb-3"></div>

            <div class="input-group">
                <input type="text" id="msg" class="form-control" placeholder="Type your message here">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function sendMessage() {
    const input = document.getElementById("msg");
    const message = input.value.trim();
    if (!message) return;

    const chat = document.getElementById("chat");
    chat.innerHTML += `<div class="chat-bubble-user"><strong>You:</strong> ${message}</div>`;

    fetch("/get?msg=" + encodeURIComponent(message))
        .then(response => response.text())
        .then(data => {
            chat.innerHTML += `<div class="chat-bubble-bot"><strong>Bot:</strong> ${data}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

    input.value = "";
}
</script>
{% endblock %}
