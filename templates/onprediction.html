{% extends "base.html" %}
{% block title %}Prediction Module{% endblock %}

{% block content %}
<div class="card section-card p-4">
    <h2 class="fw-bold mb-3">Stock Prediction</h2>
    <p class="text-muted">This module can be extended with company search, model results, charts, and confidence metrics.</p>
    <form class="row g-3 mt-2">
        <div class="col-md-8">
            <input type="text" class="form-control" placeholder="Enter company name">
        </div>
        <div class="col-md-4 d-grid">
            <button class="btn btn-primary">Predict</button>
        </div>
    </form>
</div>
{% endblock %}
