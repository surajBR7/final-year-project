{% extends "base.html" %}
{% block title %}Sentiment by Company{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card section-card p-4">
            <h2 class="fw-bold mb-3">Company Sentiment</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company" class="form-control" placeholder="Enter company name">
                </div>
                <button type="submit" class="btn btn-primary">Fetch Tweets</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
